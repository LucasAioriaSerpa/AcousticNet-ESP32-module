<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <title>Test connection</title>
  </head>
  <body>
    <main class="conteudo_principal">
      <h1>Dashboard Test FC-04</h1>
      <div class="connection-container">
        <div class="input-container">
          <label for="ipInput" class="label-ip"
            >Endereço IP do Sensor:
            <input type="text" id="ipInput" placeholder="ex: 192.168.0.100" />
          </label>
          <button type="button" id="connectBtn">Conectar</button>
        </div>
      </div>
      <h3>Status da conexão:</h3>
      <div class="status-ESP32">
        <div id="status-connection">Aguardando conexão...</div>
      </div>
      <div class="cards">
        <div class="card">
          Decibeis do FC-04
          <span id="FC04decibeis">-- Db</span>
        </div>
      </div>
      <div class="charts">
        <div class="chart-container">
          <canvas id="chartDecibeis"></canvas>
        </div>
      </div>
    </main>
    <script src="main.js"></script>
  </body>
</html>
